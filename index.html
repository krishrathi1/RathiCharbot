<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nemotron Ghost</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
  <style>
    :root {
      --text: #1a1a1a;
      --text-dim: rgba(0, 0, 0, 0.45);
      --bg: rgba(255, 255, 255, 0.25);
      --border: rgba(0, 0, 0, 0.08);
      --accent: #2563eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      padding: 8px;
      overflow: hidden;
      color: var(--text);
    }

    .container {
      width: 100%;
      height: 100%;
      background: var(--bg);
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Drag Bar ─── */
    .titlebar {
      height: 36px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .titlebar-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .titlebar-controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .titlebar-controls span {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .ctrl-min { background: rgba(0,0,0,0.15); }
    .ctrl-close { background: rgba(0,0,0,0.25); }
    .ctrl-min:hover, .ctrl-close:hover { opacity: 0.7; }

    /* ─── Chat Area ─── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat::-webkit-scrollbar { width: 3px; }
    .chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .msg {
      max-width: 92%;
      font-size: 13px;
      line-height: 1.65;
      animation: fadeUp 0.35s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(0, 0, 0, 0.06);
      padding: 8px 14px;
      border-radius: 14px 14px 4px 14px;
      font-weight: 500;
      font-size: 12.5px;
    }

    .msg.bot {
      align-self: flex-start;
      padding: 2px 0;
      font-weight: 400;
    }

    .msg.bot.scan-source {
      font-size: 11px;
      color: var(--text-dim);
      border-left: 2px solid var(--accent);
      padding-left: 10px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Markdown content styling */
    .msg.bot p { margin: 4px 0; }
    .msg.bot ul, .msg.bot ol { padding-left: 18px; margin: 6px 0; }
    .msg.bot strong { font-weight: 600; }

    .msg.bot pre {
      background: rgba(0, 0, 0, 0.75) !important;
      color: #e5e5e5;
      padding: 10px 14px;
      border-radius: 10px;
      margin: 8px 0;
      font-size: 12px;
      overflow-x: auto;
    }

    .msg.bot code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .msg.bot :not(pre) > code {
      background: rgba(0, 0, 0, 0.07);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 11.5px;
    }

    .typing-dots::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* ─── Input ─── */
    .input-area {
      padding: 10px 14px 16px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.25s;
    }

    .input-row:focus-within {
      border-color: rgba(0, 0, 0, 0.2);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      height: 22px;
      max-height: 80px;
      line-height: 22px;
    }

    textarea::placeholder { color: var(--text-dim); }

    .btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      color: var(--text-dim);
      background: transparent;
    }

    .btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }
    .btn-send { background: var(--text); color: white; }
    .btn-send:hover { background: #000; transform: scale(1.05); }

    .status {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-top: 8px;
      padding: 0 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar">
      <span class="titlebar-label">Ghost</span>
      <div class="titlebar-controls">
        <span class="ctrl-min" onclick="ipcRenderer.send('window-minimize')"></span>
        <span class="ctrl-close" onclick="ipcRenderer.send('window-close')"></span>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask anything..."></textarea>
        <button class="btn" title="Scan Screen (Ctrl+A)" onclick="triggerScan()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button class="btn btn-send" onclick="sendMessage()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="status">
        <span id="statusLabel">Ready</span>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.1" value="0.9" style="width: 35px; height: 4px;" title="Opacity">
          <a href="#" onclick="location.reload()" style="color: var(--text-dim); text-decoration: none; font-size: 8px;">Reset</a>
          <a href="#" id="autoToggle" style="color: var(--text-dim); text-decoration: none;">Auto: OFF</a>
          <a href="#" id="modeToggle" style="color: var(--accent); text-decoration: none;">Ghost Mode</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    require('dotenv').config();

    // ─── Marked + Highlight.js Setup ─────────────────────────────
    const { markedHighlight } = globalThis.markedHighlight;
    marked.use(markedHighlight({
      langPrefix: 'hljs language-',
      highlight(code, lang) {
        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
        return hljs.highlight(code, { language }).value;
      }
    }));

    // ─── Config (Gemini 2.5 Flash) ───────────────────────────────
    const API_KEYS = [
      process.env.GEMINI_API_KEY_1,
      process.env.GEMINI_API_KEY_2,
      process.env.GEMINI_API_KEY_3,
      process.env.GEMINI_API_KEY_4,
      process.env.GEMINI_API_KEY_5
    ].filter(k => k && k.trim().length > 0);

    let currentKeyIndex = 0;
    const getApiKey = () => API_KEYS[currentKeyIndex] || API_KEYS[0];
    const rotateApiKey = () => {
      if (API_KEYS.length > 1) {
        currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
        console.log(`[Ghost] Rotated to API Key #${currentKeyIndex + 1}`);
      }
    };

    const GEMINI_MODEL = process.env.GEMINI_MODEL || 'gemini-3-flash-preview';
    const GEMINI_URL = (model) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${getApiKey()}`;

    const SYSTEM_PROMPT = 'Give ONLY the correct option letter (A/B/C/D) or a 1-word answer. No explanations. No reasoning. No greetings.';

    // ─── Conversation Memory ─────────────────────────────────────
    let conversationHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
    const MAX_HISTORY = 4;

    // ─── DOM ─────────────────────────────────────────────────────
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const statusLabel = document.getElementById('statusLabel');

    let isBusy = false;

    function setStatus(msg) { statusLabel.textContent = msg; }

    input.addEventListener('input', () => {
      input.style.height = '22px';
      input.style.height = Math.min(input.scrollHeight, 80) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ─── Message Rendering ───────────────────────────────────────
    function addMsg(text, sender, extraClass = '') {
      const div = document.createElement('div');
      div.className = `msg ${sender} ${extraClass}`.trim();
      chat.appendChild(div);
      if (sender === 'user') {
        div.textContent = text;
      } else {
        renderBot(div, text);
      }
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function renderBot(div, raw) {
      let clean = raw.replace(/<thought>[\s\S]*?<\/thought>/g, '').trim();
      clean = clean.replace(/<thought>[\s\S]*$/g, '').trim();
      div.innerHTML = clean ? marked.parse(clean) : '<span class="typing-dots"></span>';
    }

    // ─── Stream Response Handler (Gemini) ────────────────────────
    async function streamGemini(contents, botDiv) {
      let attempts = 0;
      const maxAttempts = Math.max(API_KEYS.length, 1);

      while (attempts < maxAttempts) {
        let fullResponse = '';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 60000);

        try {
          const res = await fetch(GEMINI_URL(GEMINI_MODEL), {
            method: 'POST',
            signal: controller.signal,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              contents, 
              safetySettings: [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, 
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, 
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, 
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
              ] 
            })
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg = errData.error?.message || `API Error ${res.status}`;
            
            // Failover for ANY error (Rate limit, Server error, etc.)
            console.warn(`[Ghost] API Key #${currentKeyIndex + 1} failed. Status: ${res.status}. Error: ${errMsg}`);
            
            if (attempts < maxAttempts - 1) {
              setStatus(`Failover: Using Backup API...`);
              rotateApiKey();
              attempts++;
              clearTimeout(timeoutId);
              continue;
            }
            throw new Error(errMsg);
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                const token = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                if (token) {
                  fullResponse += token;
                  renderBot(botDiv, fullResponse);
                  chat.scrollTop = chat.scrollHeight;
                }
              } catch (e) {}
            }
          }

          clearTimeout(timeoutId);
          return fullResponse;

        } catch (err) {
          clearTimeout(timeoutId);
          if (attempts < maxAttempts - 1) {
            console.warn(`[Ghost] Network error with Key #${currentKeyIndex + 1}. Retrying with backup...`);
            setStatus(`Failover: Connection issue, using backup...`);
            rotateApiKey();
            attempts++;
            continue;
          }
          throw err;
        }
      }
    }

    // ─── Send Text Message (typed questions) ─────────────────────
    async function sendMessage(overrideText = null) {
      const text = overrideText || input.value.trim();
      if (!text || isBusy) return;

      isBusy = true;

      addMsg(text, 'user');
      if (!overrideText) {
        input.value = '';
        input.style.height = '22px';
      }

      setStatus('Thinking...');
      
      const contents = conversationHistory.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const botDiv = addMsg('', 'bot');

      try {
        const fullResponse = await streamGemini(contents, botDiv);
        conversationHistory.push({ role: 'assistant', content: fullResponse });
        setStatus('Ready');
      } catch (err) {
        console.error('[Ghost] API Error:', err.message);
        botDiv.textContent = '⚠️ ' + err.message;
        setStatus('Error — try again');
      } finally {
        isBusy = false;
      }
    }

    // ─── Send Vision Message (screen captures) ──────────────────
    let busyTimer = null;
    async function sendVisionMessage(base64Image) {
      if (isBusy) return;
      isBusy = true;

      // Failsafe: Always reset busy state after 90s regardless of what happens
      if (busyTimer) clearTimeout(busyTimer);
      busyTimer = setTimeout(() => { 
        if (isBusy) {
          isBusy = false;
          setStatus('Ready (Failsafe Reset)');
        }
      }, 90000);

      addMsg('📸 Screen captured — analyzing...', 'user', 'scan-source');
      setStatus('Vision AI analyzing screen...');

      const botDiv = addMsg('', 'bot');

      try {
        const contents = [
          {
            role: 'user',
            parts: [
              { text: `Identify every question/MCQ in the image. For each, give ONLY the correct option letter (A/B/C/D) or the final 1-word answer. NO explanations. NO greetings. NO reasoning.` },
              { inline_data: { mime_type: 'image/jpeg', data: base64Image } }
            ]
          }
        ];

        const fullResponse = await streamGemini(contents, botDiv);
        setStatus('Ready');
      } catch (err) {
        console.error('[Ghost] Vision Error:', err);
        botDiv.innerHTML = `<span style="color: #ef4444;">⚠️ Error: ${err.message}. ${err.name === 'AbortError' ? 'Request timed out.' : 'Check API key or network.'}</span>`;
        setStatus('Error — resetting...');
        setTimeout(() => setStatus('Ready'), 3000);
      } finally {
        isBusy = false;
      }
    }

    // ─── Scan Trigger ────────────────────────────────────────────
    function triggerScan() {
      if (isBusy) return;
      ipcRenderer.send('trigger-scan');
    }

    // ─── Ghost Mode 2.0 Controls ────────────────────────────────
    let interactionEnabled = false;
    let autoScanEnabled = false;
    const modeToggle = document.getElementById('modeToggle');
    const autoToggle = document.getElementById('autoToggle');
    const opacitySlider = document.getElementById('opacitySlider');

    modeToggle.addEventListener('click', (e) => {
      e.preventDefault();
      interactionEnabled = !interactionEnabled;
      ipcRenderer.send('set-interaction-mode', interactionEnabled);
      modeToggle.textContent = interactionEnabled ? 'Interaction ON' : 'Ghost Mode';
      modeToggle.style.color = interactionEnabled ? '#ef4444' : 'var(--accent)';
      
      if (interactionEnabled) {
        input.focus();
        if (autoScanEnabled) autoToggle.click(); // Turn off auto when interacting
      }
    });

    autoToggle.addEventListener('click', (e) => {
      e.preventDefault();
      if (interactionEnabled) return;
      autoScanEnabled = !autoScanEnabled;
      ipcRenderer.send('set-auto-scan', autoScanEnabled);
      autoToggle.textContent = autoScanEnabled ? 'Auto: ON' : 'Auto: OFF';
      autoToggle.style.color = autoScanEnabled ? 'var(--accent)' : 'var(--text-dim)';
    });

    opacitySlider.addEventListener('input', (e) => {
      ipcRenderer.send('set-opacity', parseFloat(e.target.value));
    });

    // ─── IPC Listeners ───────────────────────────────────────────
    ipcRenderer.on('status-update', (_, msg) => setStatus(msg));
    ipcRenderer.on('screen-captured-image', (_, base64) => sendVisionMessage(base64));
    ipcRenderer.on('clipboard-data', (_, text) => sendMessage(text));

    // Handle global shortcuts forwarded from main
    ipcRenderer.on('toggle-auto-scan', () => autoToggle.click());
    ipcRenderer.on('toggle-interaction-mode', () => modeToggle.click());
  </script>
</body>
</html>
